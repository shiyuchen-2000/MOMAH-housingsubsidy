name: Deploy demo to GitHub Pages

# Auto-deploys the demo to GitHub Pages on every push to main.
# Serves standalone.html as the site index, plus the assets folder.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp standalone.html _site/index.html
          cp standalone.html _site/standalone.html
          if [ -d assets ]; then cp -r assets _site/assets; fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
