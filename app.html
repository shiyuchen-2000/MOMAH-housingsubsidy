<h1>住房补贴动态分配与优化 · DEMO</h1>
<p>有两种打开方式：</p>
<p><b>① 直接演示（无需安装）：</b>双击同目录下的 <a href="standalone.html">standalone.html</a> 即可运行。</p>
<p><b>② 工程化（Vite）：</b>在本目录执行 <code>npm install</code> 然后 <code>npm run dev</code>，浏览器打开提示的本地地址。生产构建用 <code>npm run build</code>，产物在 <code>dist/</code>。</p>
<p style="color:#5c6b63;font-size:13px">详见 README.md。所有数据为合成示意数据。</p>
